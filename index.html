<script>
/* ═══ STORAGE ═══ */
const ls = {
  get(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d } catch { return d } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
};

/* ═══ DATA LOADER ═══ */
let D = null;
async function loadData() {
  const resp = await fetch('data.json');
  D = await resp.json();
  initApp();
}

/* ═══ NAVIGATION ═══ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'sr') renderSR();
}

/* ═══ SPACED REPETITION (SM-2 simplified) ═══ */
const SR_KEY = 'mayuan_sr_v1';

function getSRData() { return ls.get(SR_KEY, {}); }
function saveSRData(d) { ls.set(SR_KEY, d); }

function srInitCard(id) {
  return { id, interval: 0, repetition: 0, efactor: 2.5, dueDate: Date.now(), status: 'new' };
}

function srReview(card, quality) {
  // quality: 1=again, 3=good, 5=easy
  if (quality < 3) {
    card.repetition = 0;
    card.interval = 1;
    card.status = 'learning';
  } else {
    if (card.repetition === 0) card.interval = 1;
    else if (card.repetition === 1) card.interval = 3;
    else card.interval = Math.round(card.interval * card.efactor);
    card.repetition++;
    card.status = card.repetition >= 3 ? 'review' : 'learning';
  }
  card.efactor = Math.max(1.3, card.efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  card.dueDate = Date.now() + card.interval * 86400000;
  return card;
}

function getSRStats() {
  const data = getSRData();
  const now = Date.now();
  const stats = { new: 0, learning: 0, review: 0, overdue: 0, total: 0 };
  const totalQ = D ? D.single.length + D.multi.length : 0;
  for (let i = 0; i < totalQ; i++) {
    const key = i < D.single.length ? 's' + i : 'm' + (i - D.single.length);
    const card = data[key];
    if (!card || card.status === 'new') stats.new++;
    else if (card.dueDate <= now) { stats.overdue++; stats.learning++; }
    else if (card.status === 'learning') stats.learning++;
    else stats.review++;
    stats.total++;
  }
  return stats;
}

function getNextReviewCard() {
  const data = getSRData();
  const now = Date.now();
  let earliest = null;
  let earliestKey = null;
  const totalQ = D.single.length + D.multi.length;
  for (let i = 0; i < totalQ; i++) {
    const key = i < D.single.length ? 's' + i : 'm' + (i - D.single.length);
    const card = data[key];
    if (!card || card.status === 'new') {
      if (!earliest) { earliest = srInitCard(key); earliestKey = key; }
      break;
    }
    if (card.dueDate <= now && (!earliest || card.dueDate < earliest.dueDate)) {
      earliest = card; earliestKey = key;
    }
  }
  return earliest ? { key: earliestKey, card: earliest } : null;
}

let currentSRCard = null;

function renderSR() {
  const stats = getSRStats();
  const panel = document.getElementById('srPanel');
  panel.innerHTML = `
    <h3>学习统计</h3>
    <div class="sr-stats">
      <span><span class="sr-dot new"></span> 新题 ${stats.new}</span>
      <span><span class="sr-dot learning"></span> 学习中 ${stats.learning}</span>
      <span><span class="sr-dot review"></span> 已掌握 ${stats.review}</span>
      <span><span class="sr-dot overdue"></span> 待复习 ${stats.overdue}</span>
    </div>`;

  const next = getNextReviewCard();
  const cardArea = document.getElementById('srCard');

  if (!next) {
    cardArea.innerHTML = '<div class="sr-panel"><p style="color:var(--success);text-align:center">所有题目已复习完毕！</p></div>';
    currentSRCard = null;
    return;
  }

  currentSRCard = next;
  const isSingle = next.key.startsWith('s');
  const idx = parseInt(next.key.substring(1));
  const q = isSingle ? D.single[idx] : D.multi[idx];
  const letters = isSingle ? ['A','B','C','D'] : ['A','B','C','D','E'];

  let html = `<div class="quiz-q">
    <div class="quiz-q-text">
      <span class="q-tag">${q.tag}</span>
      <span class="sr-badge ${next.card.status}">${next.card.status === 'new' ? '新' : next.card.status === 'learning' ? '学习' : '复习'}</span>
      ${isSingle ? '单选' : '多选'} #${idx + 1}. ${q.q}
    </div>`;

  if (isSingle) {
    html += `<ul class="quiz-opts" id="srOpts">`;
    q.opts.forEach((o, j) => {
      html += `<li onclick="srPickSingle(this,${j})"><span class="opt-letter">${letters[j]}.</span>${o}</li>`;
    });
    html += `</ul><div class="quiz-explain" id="srExplain">${q.explain || ''}</div>`;
  } else {
    html += `<ul class="quiz-opts multi" id="srOpts">`;
    q.opts.forEach((o, j) => {
      html += `<li onclick="if(!this.classList.contains('disabled'))this.classList.toggle('selected')"><span class="opt-letter">${letters[j]}.</span>${o}</li>`;
    });
    html += `</ul><button class="multi-submit" onclick="srSubmitMulti()">提交答案</button><div class="quiz-explain" id="srExplain">${q.explain || ''}</div>`;
  }

  html += `<div class="sr-rate-btns" id="srRateBtns" style="display:none">
    <button data-quality="1" onclick="srRate(1)">忘记了</button>
    <button data-quality="3" onclick="srRate(3)">记住了</button>
    <button data-quality="5" onclick="srRate(5)">很简单</button>
  </div></div>`;

  cardArea.innerHTML = html;
}

function srPickSingle(li, oi) {
  if (!currentSRCard) return;
  const ul = document.getElementById('srOpts');
  if (ul.dataset.answered) return;
  ul.dataset.answered = '1';
  const isSingle = currentSRCard.key.startsWith('s');
  const idx = parseInt(currentSRCard.key.substring(1));
  const q = D.single[idx];
  const all = ul.querySelectorAll('li');
  all.forEach(l => l.classList.add('disabled'));
  if (oi === q.ans) {
    li.classList.add('correct');
  } else {
    li.classList.add('wrong');
    all[q.ans].classList.add('show-answer');
    all[q.ans].classList.remove('disabled');
  }
  document.getElementById('srExplain').classList.add('show');
  document.getElementById('srRateBtns').style.display = 'flex';
}

function srSubmitMulti() {
  if (!currentSRCard) return;
  const ul = document.getElementById('srOpts');
  if (ul.dataset.answered) return;
  const idx = parseInt(currentSRCard.key.substring(1));
  const q = D.multi[idx];
  const all = ul.querySelectorAll('li');
  const selected = [];
  all.forEach((l, j) => { if (l.classList.contains('selected')) selected.push(j); });
  ul.dataset.answered = '1';
  all.forEach(l => l.classList.add('disabled'));
  const correct = q.ans.slice().sort().join(',') === selected.slice().sort().join(',');
  all.forEach((l, j) => {
    if (q.ans.includes(j) && selected.includes(j)) l.classList.add('correct');
    else if (q.ans.includes(j)) l.classList.add('show-answer');
    else if (selected.includes(j)) l.classList.add('wrong');
  });
  document.getElementById('srExplain').classList.add('show');
  document.getElementById('srRateBtns').style.display = 'flex';
}

function srRate(quality) {
  if (!currentSRCard) return;
  const data = getSRData();
  let card = data[currentSRCard.key] || srInitCard(currentSRCard.key);
  card = srReview(card, quality);
  data[currentSRCard.key] = card;
  saveSRData(data);
  renderSR();
}

/* ═══ HOME ═══ */
function renderHome() {
  document.getElementById('homeSub').textContent = `${D.single.length} 单选 + ${D.multi.length} 多选 + ${D.subj.length} 主观题 + 知识点速查`;

  const statsHtml = [
    { val: D.stats.suggestedHours + 'h', label: '建议总时长' },
    { val: D.totalTopics, label: '知识板块' },
    { val: D.single.length, label: '单选题' },
    { val: D.multi.length, label: '多选题' },
    { val: D.subj.length, label: '主观题' }
  ].map(s => `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
  document.getElementById('homeStats').innerHTML = statsHtml;

  let tableHtml = '<tr style="color:var(--muted)"><td>板块</td><td>占比</td><td>建议时长</td><td>难度</td></tr>';
  D.topics.forEach(t => {
    const bold = t.id === 6 ? 'font-weight:600;color:var(--accent2)' : '';
    tableHtml += `<tr><td style="${bold}">${t.name}</td><td style="${bold}">${t.pct}</td><td style="${bold}">${t.hours}h</td><td style="${bold}">${t.difficulty}</td></tr>`;
  });
  document.getElementById('examTable').innerHTML = tableHtml;

  const strategies = [
    '先理解后记忆：每个板块先读懂原理，再做真题巩固，最后背主观题',
    '重点投入辩证法和认识论：合计占34%，主观题高度集中（6/15道）',
    '政治经济学必须会算：剩余价值率、利润率、资本有机构成的计算题反复练',
    '主观题用"关键词+展开"法：先记要点关键词，再用自己的话展开',
    '最后做完整模拟：检验时间分配，查漏补缺'
  ];
  document.getElementById('strategyBox').innerHTML = strategies.map((s, i) =>
    `<p><strong>${i + 1}.</strong> ${s}</p>`
  ).join('');
}

/* ═══ KNOWLEDGE POINTS ═══ */
function renderKP() {
  const area = document.getElementById('kpArea');
  area.innerHTML = D.knowledge.map((k, i) => {
    const topic = D.topics.find(t => t.id === k.topic);
    const items = k.sections
      ? k.sections.map(s => `<p style="color:var(--accent2);font-weight:600;margin:12px 0 8px">${s.name}</p><ul class="kp-list">${s.items.map(it => `<li><strong>${it.split('：')[0]}</strong>${it.includes('：') ? '：' + it.split('：').slice(1).join('：') : ''}</li>`).join('')}</ul>`).join('')
      : `<ul class="kp-list">${k.items.map(it => {
          const parts = it.split(/[：=]/);
          return `<li>${parts.length > 1 ? `<strong>${parts[0]}</strong>${it.substring(parts[0].length)}` : it}</li>`;
        }).join('')}</ul>`;

    return `<div class="kp-card" data-id="${k.topic}">
      <div class="kp-head" onclick="this.closest('.kp-card').classList.toggle('open')">
        <div class="kp-num">${String(k.topic).padStart(2, '0')}</div>
        <div class="kp-info"><div class="kp-name">${topic.name}</div><div class="kp-meta">${topic.hours}h · ${topic.pct} · ${topic.difficulty}</div></div>
        <div class="kp-arrow">›</div>
      </div>
      <div class="kp-body"><div class="kp-body-inner"><hr class="divider">${items}</div></div>
    </div>`;
  }).join('');

  const done = ls.get('mayuan_done2', {});
  const checks = document.getElementById('topicChecks');
  checks.innerHTML = '';
  for (let i = 1; i <= D.totalTopics; i++) {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (done[i] ? ' active' : '');
    b.textContent = '板块' + i;
    b.onclick = () => { if (done[i]) delete done[i]; else done[i] = true; b.classList.toggle('active'); updateProgress(); };
    checks.appendChild(b);
  }
  updateProgress();
}

function updateProgress() {
  const done = ls.get('mayuan_done2', {});
  const n = Object.keys(done).length;
  document.getElementById('progressText').textContent = n + ' / ' + D.totalTopics + ' 板块已完成';
  document.getElementById('progressFill').style.width = (n / D.totalTopics * 100) + '%';
  ls.set('mayuan_done2', done);
}

/* ═══ QUIZ ENGINE ═══ */
const tags = ['all', '绪论', '唯物论', '辩证法', '认识论', '唯物史观', '政经', '科社', 'wrong'];
let singleFilter = 'all', multiFilter = 'all';

function renderFilterBar(containerId, filterVar, filterFn) {
  const labels = { all: '全部', '绪论': '绪论', '唯物论': '唯物论', '辩证法': '辩证法', '认识论': '认识论', '唯物史观': '唯物史观', '政经': '政经', '科社': '科社', wrong: '错题' };
  document.getElementById(containerId).innerHTML = tags.map(t =>
    `<button class="filter-btn${t === filterVar ? ' active' : ''}" onclick="${filterFn}('${t}',this)">${labels[t]}</button>`
  ).join('');
}

function initSingleQuiz() {
  renderFilterBar('singleFilters', singleFilter, 'filterSingle');
  const wrong = ls.get('mayuan_s_wrong', []);
  const area = document.getElementById('singleQuizArea');
  area.innerHTML = '';
  document.getElementById('singleScore').classList.remove('show');

  let data, indices;
  if (singleFilter === 'wrong') {
    indices = wrong;
    data = indices.map(i => D.single[i]);
  } else if (singleFilter === 'all') {
    data = D.single;
    indices = data.map((_, i) => i);
  } else {
    indices = D.single.map((_, i) => i).filter(i => D.single[i].tag === singleFilter);
    data = indices.map(i => D.single[i]);
  }

  window._sState = { answered: 0, correct: 0, total: data.length };
  const letters = ['A', 'B', 'C', 'D'];

  data.forEach((d, di) => {
    const ri = indices[di];
    let html = `<div class="quiz-q"><div class="quiz-q-text"><span class="q-tag">${d.tag}</span>${ri + 1}. ${d.q}</div><ul class="quiz-opts" data-idx="${ri}">`;
    d.opts.forEach((o, j) => { html += `<li onclick="pickSingle(this,${ri},${j})"><span class="opt-letter">${letters[j]}.</span>${o}</li>`; });
    html += `</ul><div class="quiz-explain" id="sexp${ri}">${d.explain || ''}</div></div>`;
    area.insertAdjacentHTML('beforeend', html);
  });
}

function pickSingle(li, qi, oi) {
  const ul = li.parentElement;
  if (ul.dataset.answered) return;
  ul.dataset.answered = '1';
  const d = D.single[qi];
  const all = ul.querySelectorAll('li');
  all.forEach(l => l.classList.add('disabled'));
  let wrong = ls.get('mayuan_s_wrong', []);
  if (oi === d.ans) {
    li.classList.add('correct');
    window._sState.correct++;
    wrong = wrong.filter(i => i !== qi);
  } else {
    li.classList.add('wrong');
    all[d.ans].classList.add('show-answer');
    all[d.ans].classList.remove('disabled');
    if (!wrong.includes(qi)) wrong.push(qi);
  }
  ls.set('mayuan_s_wrong', wrong);
  document.getElementById('sexp' + qi).classList.add('show');
  window._sState.answered++;
  if (window._sState.answered === window._sState.total) {
    const s = window._sState;
    const el = document.getElementById('singleScore');
    el.textContent = `完成！正确 ${s.correct}/${s.total}（${Math.round(s.correct / s.total * 100)}%）`;
    el.classList.add('show');
  }
}

function filterSingle(tag, btn) {
  singleFilter = tag;
  initSingleQuiz();
}

function initMultiQuiz() {
  renderFilterBar('multiFilters', multiFilter, 'filterMulti');
  const wrong = ls.get('mayuan_m_wrong', []);
  const area = document.getElementById('multiQuizArea');
  area.innerHTML = '';
  document.getElementById('multiScore').classList.remove('show');

  let data, indices;
  if (multiFilter === 'wrong') {
    indices = wrong;
    data = indices.map(i => D.multi[i]);
  } else if (multiFilter === 'all') {
    data = D.multi;
    indices = data.map((_, i) => i);
  } else {
    indices = D.multi.map((_, i) => i).filter(i => D.multi[i].tag === multiFilter);
    data = indices.map(i => D.multi[i]);
  }

  window._mState = { answered: 0, correct: 0, total: data.length };
  const letters = ['A', 'B', 'C', 'D', 'E'];

  data.forEach((d, di) => {
    const ri = indices[di];
    let html = `<div class="quiz-q"><div class="quiz-q-text"><span class="q-tag">${d.tag}</span>${ri + 1}. ${d.q}</div><ul class="quiz-opts multi" data-idx="${ri}">`;
    d.opts.forEach((o, j) => { html += `<li onclick="toggleMulti(this,${j})"><span class="opt-letter">${letters[j]}.</span>${o}</li>`; });
    html += `</ul><button class="multi-submit" onclick="submitMulti(this,${ri})">提交答案</button><div class="quiz-explain" id="mexp${ri}">${d.explain || ''}</div></div>`;
    area.insertAdjacentHTML('beforeend', html);
  });
}

function toggleMulti(li, j) {
  if (li.classList.contains('disabled')) return;
  li.classList.toggle('selected');
}

function submitMulti(btn, qi) {
  const ul = btn.previousElementSibling;
  if (ul.dataset.answered) return;
  const d = D.multi[qi];
  const all = ul.querySelectorAll('li');
  const selected = [];
  all.forEach((l, j) => { if (l.classList.contains('selected')) selected.push(j); });
  ul.dataset.answered = '1';
  all.forEach(l => l.classList.add('disabled'));
  btn.style.display = 'none';
  let wrong = ls.get('mayuan_m_wrong', []);
  const correct = d.ans.slice().sort().join(',') === selected.slice().sort().join(',');
  if (correct) {
    window._mState.correct++;
    all.forEach((l, j) => { if (d.ans.includes(j)) l.classList.add('correct'); });
    wrong = wrong.filter(i => i !== qi);
  } else {
    all.forEach((l, j) => {
      if (d.ans.includes(j) && selected.includes(j)) l.classList.add('correct');
      else if (d.ans.includes(j)) l.classList.add('show-answer');
      else if (selected.includes(j)) l.classList.add('wrong');
    });
    if (!wrong.includes(qi)) wrong.push(qi);
  }
  ls.set('mayuan_m_wrong', wrong);
  document.getElementById('mexp' + qi).classList.add('show');
  window._mState.answered++;
  if (window._mState.answered === window._mState.total) {
    const s = window._mState;
    const el = document.getElementById('multiScore');
    el.textContent = `完成！正确 ${s.correct}/${s.total}（${Math.round(s.correct / s.total * 100)}%）`;
    el.classList.add('show');
  }
}

function filterMulti(tag, btn) {
  multiFilter = tag;
  initMultiQuiz();
}

/* ═══ SUBJECTIVE ═══ */
function renderSubj() {
  document.getElementById('subjTitle').textContent = `主观题 ${D.subj.length} 道标准答案`;
  document.getElementById('subjArea').innerHTML = D.subj.map((d, i) =>
    `<div class="subj-card"><div class="subj-head" onclick="this.closest('.subj-card').classList.toggle('open')"><div class="subj-num">${i + 1}</div><div class="subj-q">${d.q}</div><div class="subj-arrow">›</div></div><div class="subj-body"><div class="subj-body-inner"><hr class="divider"><p>${d.a}</p></div></div></div>`
  ).join('');
}

/* ═══ FORMULA ═══ */
function renderFormula() {
  const f = D.formulas;
  let html = `<div class="formula-box"><div class="formula-title">核心公式</div>`;
  f.core.forEach(c => { html += `<div class="formula-item">${c.label} = <strong>${c.expr}</strong>${c.note ? ` <span>→ ${c.note}</span>` : ''}</div>`; });
  html += `</div>`;

  html += `<div class="formula-box"><div class="formula-title">计算题解题步骤</div><div style="font-size:.85rem;line-height:1.9">`;
  f.examples.forEach((e, i) => {
    html += `<p><strong style="color:var(--accent2)">例${i + 1}：</strong>${e.text}</p><p style="padding-left:16px">${e.solution}</p>`;
  });
  html += `</div></div>`;

  html += `<div class="formula-box"><div class="formula-title">关键区分</div><div style="font-size:.85rem;line-height:1.9">`;
  f.distinctions.forEach(d => {
    html += `<p><strong style="color:var(--accent2)">${d.left} vs ${d.right}</strong>：${d.note}</p>`;
  });
  html += `</div></div>`;

  document.getElementById('formulaArea').innerHTML = html;
}

/* ═══ ERROR ANALYSIS ═══ */
function renderErrors() {
  document.getElementById('errorArea').innerHTML = D.errors.map(e =>
    `<div class="error-card"><div class="error-title">${e.title}</div><div class="error-body">${e.body}</div></div>`
  ).join('');
}

/* ═══ TIMER ═══ */
const timer = {
  interval: null, sec: 25 * 60, running: false,
  fmt(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); },
  render() { document.getElementById('timerDisplay').textContent = this.fmt(this.sec); },
  set(m) { this.pause(); this.sec = m * 60; this.render(); },
  start() {
    if (this.running) return;
    this.running = true;
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = '';
    this.interval = setInterval(() => {
      if (this.sec <= 0) { this.pause(); document.getElementById('timerDisplay').textContent = '00:00'; return; }
      this.sec--;
      this.render();
    }, 1000);
  },
  pause() {
    this.running = false;
    clearInterval(this.interval);
    document.getElementById('btnStart').style.display = '';
    document.getElementById('btnPause').style.display = 'none';
  },
  reset() { this.pause(); this.sec = 25 * 60; this.render(); }
};

/* ═══ INIT ═══ */
function initApp() {
  D.meta.stats = { singleCount: D.single.length, multiCount: D.multi.length, subjCount: D.subj.length, suggestedHours: D.topics.reduce((s, t) => s + t.hours, 0) };
  renderHome();
  renderKP();
  renderFormula();
  renderErrors();
  initSingleQuiz();
  initMultiQuiz();
  renderSubj();
  timer.render();
}

loadData();
</script>
